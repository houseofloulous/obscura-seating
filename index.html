<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Obscura × House of LouLou's</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <style>
    :root{
      --cream:#f5f0eb;
      --ink:#111111;
      --navy:#1e3a4a;
      --soft:#e7e0d8;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:var(--cream);
      color:var(--ink);
      font-family:"Instrument Serif", serif;
    }

    .wrap{
      max-width:1400px;
      margin:0 auto;
      padding:40px 32px 60px;
    }

    .header{
      text-align:center;
      margin-bottom:30px;
    }

    h1{
      margin:0 0 8px;
      font-size:72px;
      font-style:italic;
      font-weight:400;
      line-height:1;
    }

    .meta{
      font-size:22px;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-style:normal;
    }

    .layout{
      display:grid;
      grid-template-columns:minmax(0,1fr) 340px;
      gap:32px;
      align-items:start;
    }

    .map-shell{
      position:relative;
      background:transparent;
    }

    .map{
      position:relative;
      width:100%;
      aspect-ratio: 1440 / 1024;
      background:url("red-pavilion-floorplan.png") center top / contain no-repeat;
    }

    .hotspot{
      position:absolute;
      transform:translate(-50%,-50%);
      border:none;
      background:rgba(30,58,74,.08);
      cursor:pointer;
      border-radius:999px;
      transition:.18s ease;
    }

    .hotspot:hover,
    .hotspot.active{
      background:rgba(30,58,74,.22);
      outline:1px solid rgba(30,58,74,.45);
    }

    .rect{border-radius:14px}
    .booth{border-radius:40% 40% 48% 48% / 32% 32% 60% 60%}
    .zone{border-radius:30px}

    .sidebar{
      background:rgba(255,255,255,.45);
      border:1px solid rgba(17,17,17,.12);
      padding:24px;
      min-height:260px;
    }

    .kicker{
      font-size:15px;
      letter-spacing:.08em;
      text-transform:uppercase;
      margin-bottom:10px;
    }

    .name{
      font-size:42px;
      line-height:1;
      margin:0 0 10px;
      font-style:italic;
      font-weight:400;
    }

    .price{
      font-size:28px;
      margin-bottom:14px;
    }

    .desc{
      font-size:20px;
      line-height:1.35;
      margin-bottom:22px;
    }

    .btn{
      display:inline-block;
      width:100%;
      text-align:center;
      text-decoration:none;
      background:var(--navy);
      color:#fff;
      padding:16px 20px;
      font-size:18px;
      letter-spacing:.04em;
    }

    @media (max-width: 980px){
      .layout{grid-template-columns:1fr}
      h1{font-size:48px}
      .meta{font-size:16px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>Obscura × House of LouLou's</h1>
      <div class="meta">May 2, 2026 • Red Pavilion • 8:00 PM</div>
    </div>

    <div class="layout">
      <div class="map-shell">
        <div class="map" id="map"></div>
      </div>

      <aside class="sidebar">
        <div class="kicker">Selection</div>
        <h2 class="name" id="name">Choose a table</h2>
        <div class="price" id="price"></div>
        <div class="desc" id="desc">Select a section on the map to reserve.</div>
        <a class="btn" id="reserve" href="#" target="_blank" rel="noopener" style="display:none;">Reserve</a>
      </aside>
    </div>
  </div>

  <script>
    const items = [
      { id:"ga", cls:"zone rect", x:83, y:48, w:25, h:56, name:"General Admission", price:"$70", desc:"Standing room access.", url:"PASTE_GA_URL" },

      { id:"13", cls:"", x:38.2, y:31.2, w:5.3, h:7.4, name:"Table 13", price:"Salon Table for 2 • $300", desc:"Reserved table for two.", url:"PASTE_TABLE2_URL" },
      { id:"14", cls:"", x:50.0, y:31.2, w:5.3, h:7.4, name:"Table 14", price:"Salon Table for 2 • $300", desc:"Reserved table for two.", url:"PASTE_TABLE2_URL" },
      { id:"15", cls:"", x:61.5, y:31.2, w:5.3, h:7.4, name:"Table 15", price:"Salon Table for 2 • $300", desc:"Reserved table for two.", url:"PASTE_TABLE2_URL" },

      { id:"17", cls:"booth", x:25.6, y:35.8, w:7.8, h:14.2, name:"Booth 17", price:"Madame's Booth for 6 • $1,800", desc:"Reserved booth for six.", url:"PASTE_BOOTH_URL" },
      { id:"16", cls:"booth", x:25.6, y:56.2, w:7.8, h:14.2, name:"Booth 16", price:"Madame's Booth for 6 • $1,800", desc:"Reserved booth for six.", url:"PASTE_BOOTH_URL" },

      { id:"10", cls:"", x:42.0, y:47.2, w:6.5, h:9.2, name:"Table 10", price:"Salon Table for 4 • $900", desc:"Reserved table for four.", url:"PASTE_TABLE4_URL" },
      { id:"11", cls:"", x:59.5, y:47.2, w:6.5, h:9.2, name:"Table 11", price:"Salon Table for 4 • $900", desc:"Reserved table for four.", url:"PASTE_TABLE4_URL" },
      { id:"12", cls:"", x:76.5, y:47.2, w:6.5, h:9.2, name:"Table 12", price:"Salon Table for 4 • $900", desc:"Reserved table for four.", url:"PASTE_TABLE4_URL" },

      { id:"7", cls:"", x:42.0, y:64.0, w:6.5, h:9.2, name:"Table 7", price:"Salon Table for 4 • $900", desc:"Reserved table for four.", url:"PASTE_TABLE4_URL" },
      { id:"8", cls:"", x:59.5, y:64.0, w:6.5, h:9.2, name:"Table 8", price:"Salon Table for 4 • $900", desc:"Reserved table for four.", url:"PASTE_TABLE4_URL" },
      { id:"9", cls:"", x:76.5, y:64.0, w:6.5, h:9.2, name:"Table 9", price:"Salon Table for 4 • $900", desc:"Reserved table for four.", url:"PASTE_TABLE4_URL" },

      { id:"21", cls:"rect", x:42.1, y:76.8, w:5.0, h:4.0, name:"Table 21", price:"Intimate Stage Table Seat • $350", desc:"Intimate stage table seating.", url:"PASTE_STAGE_URL" },
      { id:"22", cls:"rect", x:42.1, y:87.0, w:5.0, h:4.0, name:"Table 22", price:"Intimate Stage Table Seat • $350", desc:"Intimate stage table seating.", url:"PASTE_STAGE_URL" }
    ];

    const map = document.getElementById("map");
    const nameEl = document.getElementById("name");
    const priceEl = document.getElementById("price");
    const descEl = document.getElementById("desc");
    const reserveEl = document.getElementById("reserve");

    function selectItem(item, el){
      document.querySelectorAll(".hotspot").forEach(h => h.classList.remove("active"));
      el.classList.add("active");
      nameEl.textContent = item.name;
      priceEl.textContent = item.price;
      descEl.textContent = item.desc;
      reserveEl.href = item.url;
      reserveEl.style.display = "inline-block";
    }

    items.forEach(item => {
      const el = document.createElement("button");
      el.className = `hotspot ${item.cls || ""}`;
      el.style.left = `${item.x}%`;
      el.style.top = `${item.y}%`;
      el.style.width = `${item.w}%`;
      el.style.height = `${item.h}%`;
      el.setAttribute("aria-label", item.name);
      el.addEventListener("click", () => selectItem(item, el));
      map.appendChild(el);
    });
  </script>
</body>
</html>
