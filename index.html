<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OBSCURA x House of LouLou’s</title>
  <style>
    :root {
      --cream: #f5f0eb;
      --ink: #111111;
      --navy: #1e3a4a;
      --taupe: #c7b8a3;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--cream);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px 48px;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: .18em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 40px;
      line-height: 1.05;
      font-weight: 600;
    }

    .meta {
      font-size: 14px;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 28px;
      align-items: start;
    }

    .map-shell {
      background: #fff;
      border: 1px solid rgba(17,17,17,.12);
      padding: 18px;
    }

    .map {
      position: relative;
      width: 100%;
      aspect-ratio: 900 / 1200;
      background: url("red-pavilion-obscura-map.png") center/contain no-repeat;
    }

    .hotspot {
      position: absolute;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      border: 1.5px solid rgba(17,17,17,.55);
      background: rgba(255,255,255,.18);
      backdrop-filter: blur(2px);
      cursor: pointer;
      transition: .18s ease;
    }

    .hotspot:hover,
    .hotspot.active {
      background: rgba(30,58,74,.14);
      border-color: var(--navy);
    }

    .hotspot.rect { border-radius: 14px; }
    .hotspot.zone { border-radius: 24px; }

    .sidebar {
      background: #fff;
      border: 1px solid rgba(17,17,17,.12);
      padding: 22px;
      position: sticky;
      top: 24px;
    }

    .label {
      font-size: 11px;
      letter-spacing: .16em;
      text-transform: uppercase;
      opacity: .7;
      margin-bottom: 8px;
    }

    .name {
      font-size: 28px;
      line-height: 1.1;
      margin: 0 0 8px;
    }

    .price {
      font-size: 18px;
      margin-bottom: 16px;
    }

    .desc {
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      width: 100%;
      text-align: center;
      padding: 14px 18px;
      background: var(--navy);
      color: white;
      text-decoration: none;
      letter-spacing: .12em;
      text-transform: uppercase;
      font-size: 12px;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      h1 { font-size: 30px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Neo-Noir Cabaret</div>
    <h1>OBSCURA x House of LouLou’s</h1>
    <div class="meta">May 2, 2026 • 8:00 PM • Red Pavilion • New York</div>

    <div class="layout">
      <div class="map-shell">
        <div class="map" id="map"></div>
      </div>

      <aside class="sidebar">
        <div class="label">Selection</div>
        <h2 class="name" id="name">Select a table or section</h2>
        <div class="price" id="price"> </div>
        <div class="desc" id="desc">
          Tap any highlighted area on the floor plan to view details and reserve.
        </div>
        <a class="btn" id="reserve" href="#" target="_blank" rel="noopener" style="display:none;">Reserve</a>
      </aside>
    </div>
  </div>

  <script>
    const items = [
      {
        id: "ga",
        type: "zone",
        x: 78, y: 18, w: 18, h: 34,
        name: "General Admission",
        price: "$70",
        desc: "Standing room access.",
        url: "PASTE_SQUARESPACE_GA_URL"
      },
      {
        id: "14",
        type: "circle",
        x: 58, y: 25, w: 5, h: 5,
        name: "Table 14",
        price: "Salon Table for 2 • $300",
        desc: "High-top seating.",
        url: "PASTE_TABLE_FOR_2_URL"
      },
      {
        id: "15",
        type: "circle",
        x: 66, y: 25, w: 5, h: 5,
        name: "Table 15",
        price: "Salon Table for 2 • $300",
        desc: "High-top seating.",
        url: "PASTE_TABLE_FOR_2_URL"
      }
    ];

    const map = document.getElementById("map");
    const nameEl = document.getElementById("name");
    const priceEl = document.getElementById("price");
    const descEl = document.getElementById("desc");
    const reserveEl = document.getElementById("reserve");

    function selectItem(item, el) {
      document.querySelectorAll(".hotspot").forEach(h => h.classList.remove("active"));
      el.classList.add("active");
      nameEl.textContent = item.name;
      priceEl.textContent = item.price;
      descEl.textContent = item.desc;
      reserveEl.href = item.url;
      reserveEl.style.display = "inline-block";
    }

    items.forEach(item => {
      const el = document.createElement("button");
      el.className = `hotspot ${item.type === "zone" ? "zone rect" : item.type === "rect" ? "rect" : ""}`;
      el.style.left = `${item.x}%`;
      el.style.top = `${item.y}%`;
      el.style.width = `${item.w}%`;
      el.style.height = `${item.h}%`;
      el.setAttribute("aria-label", item.name);
      el.addEventListener("click", () => selectItem(item, el));
      map.appendChild(el);
    });
  </script>
</body>
</html>
