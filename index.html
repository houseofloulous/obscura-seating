<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obscura Seating Selector</title>
    <style>
        :root {
            --cream: #f5f0eb;
            --navy: #1e3a4a;
            --black: #1a1a1a;
            --taupe: #d2c5b8;
        }
        body {
            background-color: var(--cream);
            color: var(--black);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            text-align: center;
            padding: 40px 20px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        h1 {
            font-family: "EB Garamond", serif;
            font-style: italic;
            font-size: 2.5rem;
            margin: 0;
            font-weight: 400;
            text-transform: none;
            letter-spacing: 0;
        }
        .meta { font-size: 0.8rem; margin-top: 10px; }
        
        #map-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            background: var(--cream);
        }
        svg { width: 100%; height: auto; cursor: crosshair; }

        /* Styling for the different zones */
        .ga-zone { fill: rgba(30, 58, 74, 0.1); stroke: var(--navy); stroke-dasharray: 4; }
        .stage { fill: var(--taupe); opacity: 0.6; }
        .table-shape { fill: white; stroke: var(--black); stroke-width: 1.5; transition: 0.2s; cursor: pointer; }
        .table-shape:hover { fill: var(--navy); stroke: var(--navy); }
        .seat-dot { fill: var(--navy); stroke: white; stroke-width: 1; }
        .label { font-size: 14px; font-weight: bold; pointer-events: none; text-anchor: middle; }
        
        .sidebar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            border-top: 1px solid #ccc;
            padding: 20px;
            display: none;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
            z-index: 100;
        }
        .btn {
            background: var(--navy);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<header>
    <h1>Obscura × House of LouLou's</h1>
    <div class="meta">MAY 2, 2026 • RED PAVILION • 8:00 PM</div>
</header>

<div id="map-container">
    <svg viewBox="0 0 1000 1200" xmlns="http://www.w3.org/2000/svg">
        <path d="M 600,50 L 950,50 L 950,600 L 800,600 L 800,250 L 600,250 Z" class="ga-zone" />
        <text x="800" y="150" text-anchor="middle" font-size="20" fill="var(--navy)">GA AREA</text>

        <rect x="250" y="550" width="500" height="60" class="stage" />
        <text x="500" y="585" text-anchor="middle" font-size="16">DINNER TABLE STAGE</text>

        <path d="M 300,1100 A 200,100 0 0 1 700,1100 Z" class="stage" />
        <text x="500" y="1140" text-anchor="middle">MAIN STAGE</text>

        <g class="booth" onclick="selectItem('Madame\'s Booth', '$1,800', 'https://www.houseofloulous.com/obscura')">
            <path d="M 80,150 Q 50,200 80,250 Q 120,300 150,250 Q 180,200 150,150 Z" class="table-shape" />
            <text x="115" y="210" class="label">17</text>
        </g>
        <g class="booth" onclick="selectItem('Madame\'s Booth', '$1,800', 'https://www.houseofloulous.com/obscura')">
            <path d="M 80,350 Q 50,400 80,450 Q 120,500 150,450 Q 180,400 150,350 Z" class="table-shape" />
            <text x="115" y="410" class="label">16</text>
        </g>

        <circle cx="250" cy="150" r="35" class="table-shape" onclick="selectItem('Table 13', '$300', '#')" />
        <text x="250" y="155" class="label">13</text>
        
        <circle cx="400" cy="150" r="35" class="table-shape" onclick="selectItem('Table 14', '$300', '#')" />
        <text x="400" y="155" class="label">14</text>

        <circle cx="530" cy="150" r="35" class="table-shape" onclick="selectItem('Table 15', '$300', '#')" />
        <text x="530" y="155" class="label">15</text>

        <circle cx="300" cy="300" r="45" class="table-shape" />
        <text x="300" y="305" class="label">10</text>
        <circle cx="500" cy="300" r="45" class="table-shape" />
        <text x="500" y="305" class="label">11</text>
        <circle cx="700" cy="300" r="45" class="table-shape" />
        <text x="700" y="305" class="label">12</text>

        <circle cx="300" cy="450" r="45" class="table-shape" />
        <text x="300" y="455" class="label">7</text>
        <circle cx="500" cy="450" r="45" class="table-shape" />
        <text x="500" y="455" class="label">8</text>
        <circle cx="700" cy="450" r="45" class="table-shape" />
        <text x="700" y="455" class="label">9</text>

        <rect x="270" y="520" width="60" height="30" class="table-shape" />
        <text x="300" y="540" class="label" style="font-size:10px">21</text>
        <rect x="270" y="610" width="60" height="30" class="table-shape" />
        <text x="300" y="630" class="label" style="font-size:10px">22</text>

        <rect x="200" y="1050" width="80" height="40" class="table-shape" />
        <text x="240" y="1075" class="label">19</text>
        <rect x="720" y="1050" width="80" height="40" class="table-shape" />
        <text x="760" y="1075" class="label">20</text>
        
        <circle cx="850" cy="1000" r="30" class="table-shape" />
        <text x="850" y="1005" class="label">1</text>

    </svg>
</div>

<div id="selection-sidebar" class="sidebar">
    <h3 id="selected-name">Select a Table</h3>
    <p id="selected-price"></p>
    <a href="#" id="reserve-link" class="btn">Reserve Tickets</a>
</div>

<script>
    function selectItem(name, price, link) {
        document.getElementById('selection-sidebar').style.display = 'block';
        document.getElementById('selected-name').innerText = name;
        document.getElementById('selected-price').innerText = price;
        document.getElementById('reserve-link').href = link;
    }
</script>

</body>
</html>
