<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Obscura × House of LouLou's</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cream: #f5f0eb;
      --ink: #1a1a1a;
      --muted: #6f6a63;
      --line: rgba(26, 26, 26, 0.14);
      --panel: rgba(255, 255, 255, 0.42);
      --button: #1f2f3a;
      --button-hover: #16232c;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--cream);
      color: var(--ink);
      font-family: "Instrument Serif", serif;
    }

    body {
      min-height: 100vh;
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 36px 34px 56px;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .title {
      margin: 0 0 10px;
      font-size: clamp(46px, 6vw, 84px);
      line-height: 0.96;
      font-style: italic;
      font-weight: 400;
      letter-spacing: -0.02em;
    }

    .meta {
      margin: 0;
      font-size: clamp(17px, 1.8vw, 24px);
      line-height: 1.3;
      letter-spacing: 0.04em;
    }

    .map-wrap {
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
    }

    .map-shell {
      position: relative;
      width: 100%;
      aspect-ratio: 1440 / 980;
      background:
        linear-gradient(rgba(245,240,235,0.05), rgba(245,240,235,0.05)),
        url("red-pavilion-floorplan.png") center top / contain no-repeat;
    }

    .hotspot {
      position: absolute;
      transform: translate(-50%, -50%);
      background: rgba(31, 47, 58, 0.04);
      border: 1px solid rgba(31, 47, 58, 0.08);
      border-radius: 999px;
      cursor: pointer;
      transition: background 180ms ease, border-color 180ms ease, transform 180ms ease;
      padding: 0;
    }

    .hotspot:hover,
    .hotspot:focus-visible,
    .hotspot.active {
      background: rgba(31, 47, 58, 0.12);
      border-color: rgba(31, 47, 58, 0.28);
      outline: none;
    }

    .hotspot.rect {
      border-radius: 12px;
    }

    .hotspot.booth {
      border-radius: 42% 42% 48% 48% / 34% 34% 62% 62%;
    }

    .hotspot.zone {
      border-radius: 32px;
    }

    .selection {
      max-width: 500px;
      margin: 26px auto 0;
      min-height: 170px;
      padding: 24px 26px 26px;
      background: var(--panel);
      border: 1px solid var(--line);
      backdrop-filter: blur(4px);
    }

    .selection-label {
      margin: 0 0 10px;
      font-size: 16px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .selection-name {
      margin: 0 0 6px;
      font-size: clamp(34px, 4vw, 48px);
      line-height: 1;
      font-style: italic;
      font-weight: 400;
    }

    .selection-type {
      margin: 0 0 6px;
      font-size: clamp(23px, 2.5vw, 30px);
      line-height: 1.18;
    }

    .selection-price {
      margin: 0 0 16px;
      font-size: clamp(26px, 2.8vw, 34px);
      line-height: 1.1;
    }

    .selection-copy {
      margin: 0 0 20px;
      font-size: 24px;
      line-height: 1.3;
      color: var(--muted);
    }

    .reserve-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 210px;
      padding: 15px 24px;
      background: var(--button);
      color: #fff;
      text-decoration: none;
      font-size: 20px;
      line-height: 1;
      transition: background 180ms ease;
    }

    .reserve-btn:hover,
    .reserve-btn:focus-visible {
      background: var(--button-hover);
      outline: none;
    }

    .reserve-btn[hidden] {
      display: none;
    }

    @media (max-width: 900px) {
      .page {
        padding: 24px 18px 40px;
      }

      .map-wrap {
        max-width: 100%;
      }

      .selection {
        margin-top: 20px;
        padding: 20px 18px 22px;
      }

      .selection-copy {
        font-size: 20px;
      }

      .reserve-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <h1 class="title">Obscura × House of LouLou's</h1>
      <p class="meta">May 2, 2026 • Red Pavilion • Check-in begins at 8:30 PM • Show at 9:00 PM</p>
    </header>

    <section class="map-wrap">
      <div class="map-shell" id="map-shell" aria-label="Obscura floor plan"></div>

      <div class="selection" id="selection-card" aria-live="polite">
        <p class="selection-label">Selection</p>
        <h2 class="selection-name" id="selection-name">Select a table or section</h2>
        <p class="selection-type" id="selection-type"></p>
        <p class="selection-price" id="selection-price"></p>
        <p class="selection-copy" id="selection-copy">Reserve seating directly from the floor plan.</p>
        <a
          class="reserve-btn"
          id="reserve-btn"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
          hidden
        >Reserve</a>
      </div>
    </section>
  </main>

    const selectionPrice = document.getElementById("selection-price");
    const selectionCopy = document.getElementById("selection-copy");
    const reserveBtn = document.getElementById("reserve-btn");

    function setSelection(item, el) {
      document.querySelectorAll(".hotspot").forEach((node) => node.classList.remove("active"));
      el.classList.add("active");

      selectionName.textContent = item.name;
      selectionType.textContent = item.type;
      selectionPrice.textContent = item.price;
      selectionCopy.textContent = item.copy;
      reserveBtn.href = item.url;
      reserveBtn.hidden = false;
    }

    items.forEach((item) => {
      const button = document.createElement("button");
      button.className = `hotspot ${item.cls || ""}`;
      button.type = "button";
      button.style.left = `${item.x}%`;
      button.style.top = `${item.y}%`;
      button.style.width = `${item.w}%`;
      button.style.height = `${item.h}%`;
      button.setAttribute("aria-label", `${item.name}, ${item.type}, ${item.price}`);
      button.addEventListener("click", () => setSelection(item, button));
      mapShell.appendChild(button);
    });

</html>
